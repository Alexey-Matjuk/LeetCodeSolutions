name: LeetCode Solution Template
description: A template for generating a LeeCode solution
variables:
  solution_name:
    description: The name of the solution
    required: true
files:
  - path: Package.swift
    contents: |
      // swift-tools-version: 6.0
      // The swift-tools-version declares the minimum version of Swift required to build this package.

      import PackageDescription

      let package = Package(
          name: "{{ solution_name }}",
          platforms: [.macOS(.v15)],
          targets: [
              .target(
                  name: "{{ solution_name }}",
                  path: "Sources"
              ),
              .testTarget(
                  name: "{{ solution_name }}Tests",
                  dependencies: ["{{ solution_name }}"],
                  path: "Tests"
              ),
          ]
      )
  - path: Sources/Solution.swift
    contents: |
      /// - Time complexity: O(<#Complexity#>)
      /// - Space complexity: O(<#Complexity#>)
      class Solution {
          func {{ solution_name|lowerFirstLetter }}(<#Parameters#>) -> <#Result Type#> {
              <#Implementation#>
          }
      }
  - path: Tests/Tests.swift
    contents: |
      import Testing
      @testable import {{ solution_name }}
      
      @Test(arguments: [
          (<#Input#>, <#Output#>),
      ])
      func {{ solution_name|lowerFirstLetter }}(_ input: <#Input Type#>, _ output: <#Output Type#>) {
          #expect(Solution().{{ solution_name|lowerFirstLetter }}(input) == output)
      }
